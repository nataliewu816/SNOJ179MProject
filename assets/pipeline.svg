<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#a8f0c0"/>
    </marker>
    <marker id="arrow-loop" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 12 4.5, 0 9" fill="#64d4f0"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ab866;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b89c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aaee44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#77cc11;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f16;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0f0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bg)" rx="16"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3022" stroke-width="0.5"/>
  </pattern>
  <rect width="960" height="580" fill="url(#grid)" rx="16" opacity="0.4"/>

  <!-- Corner accents -->
  <line x1="0" y1="0" x2="60" y2="0" stroke="#3ddc84" stroke-width="3"/>
  <line x1="0" y1="0" x2="0" y2="60" stroke="#3ddc84" stroke-width="3"/>
  <line x1="960" y1="580" x2="900" y2="580" stroke="#3ddc84" stroke-width="3"/>
  <line x1="960" y1="580" x2="960" y2="520" stroke="#3ddc84" stroke-width="3"/>

  <!-- ── NODES ── -->

  <!-- 1. New Vehicle Incoming -->
  <g filter="url(#shadow)">
    <rect x="65" y="68" width="190" height="70" rx="12" fill="url(#grad-green)"/>
    <rect x="65" y="68" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="160" y="99" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">New Vehicle</text>
  <text x="160" y="118" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">Incoming</text>

  <!-- 2. Plate Detection -->
  <g filter="url(#shadow)">
    <rect x="385" y="68" width="190" height="70" rx="12" fill="url(#grad-teal)"/>
    <rect x="385" y="68" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="480" y="99" text-anchor="middle" fill="#00261e" font-size="14" font-weight="700">Plate</text>
  <text x="480" y="118" text-anchor="middle" fill="#00261e" font-size="14" font-weight="700">Detection</text>

  <!-- 3. Plate Cropping -->
  <g filter="url(#shadow)">
    <rect x="700" y="68" width="190" height="70" rx="12" fill="url(#grad-lime)"/>
    <rect x="700" y="68" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="795" y="99" text-anchor="middle" fill="#1a2a00" font-size="14" font-weight="700">Plate</text>
  <text x="795" y="118" text-anchor="middle" fill="#1a2a00" font-size="14" font-weight="700">Cropping</text>

  <!-- 4. Reading Plate -->
  <g filter="url(#shadow)">
    <rect x="700" y="228" width="190" height="70" rx="12" fill="url(#grad-green)"/>
    <rect x="700" y="228" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="795" y="259" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">Reading</text>
  <text x="795" y="278" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">Plate</text>

  <!-- 5. Database Query -->
  <g filter="url(#shadow)">
    <rect x="700" y="388" width="190" height="70" rx="12" fill="url(#grad-teal)"/>
    <rect x="700" y="388" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="795" y="419" text-anchor="middle" fill="#00261e" font-size="14" font-weight="700">Database</text>
  <text x="795" y="438" text-anchor="middle" fill="#00261e" font-size="14" font-weight="700">Query</text>

  <!-- 6. Vehicle Detection -->
  <g filter="url(#shadow)">
    <rect x="385" y="388" width="190" height="70" rx="12" fill="url(#grad-lime)"/>
    <rect x="385" y="388" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="480" y="419" text-anchor="middle" fill="#1a2a00" font-size="14" font-weight="700">Vehicle</text>
  <text x="480" y="438" text-anchor="middle" fill="#1a2a00" font-size="14" font-weight="700">Detection</text>

  <!-- 7. Vehicle Tracking -->
  <g filter="url(#shadow)">
    <rect x="65" y="388" width="190" height="70" rx="12" fill="url(#grad-green)"/>
    <rect x="65" y="388" width="190" height="70" rx="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  </g>
  <text x="160" y="419" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">Vehicle</text>
  <text x="160" y="438" text-anchor="middle" fill="#0a2010" font-size="14" font-weight="700">Tracking</text>

  <!-- ── ARROWS ── -->
  <line x1="257" y1="103" x2="383" y2="103" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="577" y1="103" x2="698" y2="103" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="795" y1="140" x2="795" y2="226" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="795" y1="300" x2="795" y2="386" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="698" y1="423" x2="577" y2="423" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="383" y1="423" x2="257" y2="423" stroke="#a8f0c0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Loop back dashed -->
  <path d="M 100 386 L 100 240 Q 100 195 100 158 L 100 140" stroke="#64d4f0" stroke-width="2" fill="none" marker-end="url(#arrow-loop)" stroke-dasharray="8,4"/>

  <!-- Loop label pill -->
  <rect x="18" y="252" width="64" height="22" rx="11" fill="#0d2a20" stroke="#64d4f0" stroke-width="1"/>
  <text x="50" y="267" text-anchor="middle" fill="#64d4f0" font-size="10" font-weight="600" letter-spacing="1">LOOP</text>

  <!-- ── BADGES ── -->
  <circle cx="89" cy="72" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="89" y="77" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">1</text>

  <circle cx="409" cy="72" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="409" y="77" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">2</text>

  <circle cx="724" cy="72" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="724" y="77" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">3</text>

  <circle cx="724" cy="232" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="724" y="237" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">4</text>

  <circle cx="724" cy="392" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="724" y="397" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">5</text>

  <circle cx="409" cy="392" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="409" y="397" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">6</text>

  <circle cx="89" cy="392" r="12" fill="url(#badge-grad)" filter="url(#glow)"/>
  <text x="89" y="397" text-anchor="middle" fill="#0a2010" font-size="11" font-weight="800">7</text>

</svg>
