display:
  headless: false
camera:
  source: 0
  width: 1280
  height: 720
  fps: 10

detection:
  model_path: yolov8s.pt
  confidence: 0.5
  classes: [2,3,5,7]
  imgsz: 416
  process_every_n: 3

plate_detection:
  model_path: models/plates/plate_detect_model.pt
  confidence: 0.3

tracking:
  config: config/bytetrack.yaml
  max_age: 30 

spaces:
  config: config/parking_spaces.json 


entry_camera:
  source: 2  
  width: 640
  height: 480
  fps: 5

lpr:
  backend: ocr

entry_zone:
  polygon: [[0, 0], [1280, 0], [1280, 720], [0, 720]]

